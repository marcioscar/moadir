# nginx como proxy reverso para o app moadir (Node em 127.0.0.1:3000).
# Instalar em: /etc/nginx/sites-available/moadir
#
#   sudo cp deploy/nginx-moadir.conf /etc/nginx/sites-available/moadir
#   sudo ln -s /etc/nginx/sites-available/moadir /etc/nginx/sites-enabled/moadir
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS: o Let's Encrypt nao emite cert para IP puro, entao usamos o hostname
# gratuito 2.25.175.240.nip.io (resolve automaticamente para 2.25.175.240).
# Depois do reload acima, rode:
#
#   sudo certbot --nginx -d 2.25.175.240.nip.io
#
# O certbot adiciona o bloco 443 (TLS) e o redirect 80->443 automaticamente.
# Acesso final: https://2.25.175.240.nip.io
# (http://2.25.175.240 cru tambem responde, mas sem cadeado valido.)

server {
    listen 80;
    listen [::]:80;
    # nip.io para o cert + IP cru + dominio proprio:
    server_name 2.25.175.240.nip.io 2.25.175.240 empacatacadista.com.br www.empacatacadista.com.br;

    # Servir os assets com hash diretamente pelo nginx (cache longo).
    location /assets/ {
        alias /opt/moadir/build/client/assets/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
