# nginx como proxy reverso para o app moadir (Node em 127.0.0.1:3000).
# Instalar em: /etc/nginx/sites-available/moadir
#
#   sudo cp deploy/nginx-moadir.conf /etc/nginx/sites-available/moadir
#   sudo ln -s /etc/nginx/sites-available/moadir /etc/nginx/sites-enabled/moadir
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS (opcional, recomendado): sudo certbot --nginx -d seu-dominio.com

server {
    listen 80;
    listen [::]:80;
    server_name seu-dominio.com;   # troque pelo seu domínio ou IP da VPS

    # Servir os assets com hash diretamente pelo nginx (cache longo).
    location /assets/ {
        alias /opt/moadir/build/client/assets/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
