name: CI

# Valida o código a cada push (typecheck). O deploy NÃO é feito aqui:
# a VPS puxa sozinha via systemd timer (deploy pull), porque o provedor
# bloqueia de forma intermitente o SSH de entrada vindo dos runners.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
