name: Deploy para a VPS

# A cada push na main (ou disparo manual), conecta na VPS por SSH e roda o
# deploy/setup.sh, que faz git pull + build + restart do serviço.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Evita dois deploys simultâneos.
concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Rodar deploy na VPS via SSH
        env:
          # Chave PRIVADA de deploy (dedicada, restrita no servidor).
          # Cadastre em: Settings > Secrets and variables > Actions.
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Host key da VPS (chave pública, não é segredo) para verificação.
          echo '2.25.175.240 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBw1J9EhZZK0la9sCMdrAmNkYYR992E55MGQkS3qhhPF' >> ~/.ssh/known_hosts
          # A chave é restrita no servidor (forced command) e só roda o setup.sh.
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes root@2.25.175.240 'deploy'
